<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Blog{% endblock %}</title>
    <style>
        /* Variables de color para mantener la consistencia */
        :root {
            --bg-color: #ffffff;
            --text-main: #333333;
            --text-muted: #888888;
            --accent-hover: #000000;
            --border-light: #eeeeee;
        }

        /* Estilo general del cuerpo: centrado, tipografía limpia y buen espaciado */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0 auto;
            max-width: 650px;
            padding: 50px 20px;
        }

        /* Estilos de navegación */
        nav {
            font-size: 1rem;
            color: var(--border-light); /* Hace que el separador "|" sea muy sutil */
            margin-bottom: 10px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin: 0 8px;
            transition: color 0.3s ease;
        }

        nav a:first-child {
            margin-left: 0;
        }

        nav a:hover {
            color: var(--accent-hover);
        }

        
        hr {
            border: 0;
            height: 1px;
            background-color: var(--border-light);
            margin: 40px 0;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'pages:home' %}">Home</a> |
        <a href="{% url 'pages:about' %}">About</a> |
        <a href="{% url 'pages:page_list' %}">Pages</a> |
        <a href="{% url 'messaging:inbox' %}">Messages</a> |
        <a href="{% url 'accounts:signup' %}">Signup</a> |
        <a href="{% url 'accounts:login' %}">Login</a> |
        <a href="{% url 'accounts:profile' %}">Profile</a> |
       
    </nav>

    <hr>

    {% block content %}
    {% endblock %}
</body>
</html>
