{% extends 'base.html' %}

{% block title %}{{ page.title }}{% endblock %}

{% block content %}
<h1>{{ page.title }}</h1>
<h3>{{ page.subtitle }}</h3>

{% if page.image %}
    <img src="{{ page.image.url }}" alt="{{ page.title }}" width="400">
{% endif %}

<p><strong>Autor:</strong> {{ page.author }}</p>
<p><strong>Fecha:</strong> {{ page.published_date }}</p>

<div>
    {{ page.content|safe }}
</div>

{% endblock %}
